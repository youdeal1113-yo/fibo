<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fibo 支撑 · 阻力计算器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0a0a0f;
    color: #e2e8f0;
    font-family: 'DM Mono', 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 48px;
  }

  .container {
    width: 100%;
    max-width: 480px;
    padding: 0 20px;
  }

  .header {
    padding: 28px 20px 0;
    max-width: 480px;
    width: 100%;
  }
  .header-sub {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: #475569;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .header h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.15;
  }
  .header h1.buy-mode {
    background: linear-gradient(135deg, #f59e0b 0%, #10b981 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header h1.sell-mode {
    background: linear-gradient(135deg, #a78bfa 0%, #ef4444 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header p {
    font-size: 11px;
    color: #475569;
    margin-top: 5px;
    letter-spacing: 0.05em;
  }

  /* Mode toggle */
  .mode-toggle {
    display: flex;
    background: #0f1117;
    border: 1px solid #1e2433;
    border-radius: 12px;
    padding: 4px;
    margin-top: 16px;
    gap: 4px;
  }
  .mode-btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
    -webkit-tap-highlight-color: transparent;
  }
  .mode-btn.buy-active {
    background: linear-gradient(135deg, #d97706, #059669);
    color: #fff;
  }
  .mode-btn.sell-active {
    background: linear-gradient(135deg, #7c3aed, #dc2626);
    color: #fff;
  }
  .mode-btn.inactive {
    background: transparent;
    color: #475569;
  }

  /* Card */
  .card {
    background: #0f1117;
    border: 1px solid #1e2433;
    border-radius: 16px;
    padding: 20px;
    margin-top: 14px;
  }

  .input-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .input-group label {
    display: block;
    font-size: 10px;
    color: #475569;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  input[type=number] {
    width: 100%;
    background: #161b27;
    border: 1px solid #1e2433;
    border-radius: 8px;
    padding: 10px 12px;
    color: #e2e8f0;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  input[type=number].buy-focus:focus { border-color: #f59e0b; }
  input[type=number].sell-focus:focus { border-color: #a78bfa; }
  input#cur:focus { border-color: #2563eb; }

  .input-full { margin-bottom: 16px; }
  .input-full label {
    display: block;
    font-size: 10px;
    color: #475569;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .calc-btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .calc-btn.buy { background: linear-gradient(135deg, #d97706, #059669); }
  .calc-btn.sell { background: linear-gradient(135deg, #7c3aed, #dc2626); }
  .calc-btn:active { transform: scale(0.97); opacity: 0.9; }

  /* Results */
  #results { display: none; margin-top: 12px; }

  .zone-banner {
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .zone-icon { font-size: 18px; }
  .zone-title { font-size: 13px; font-weight: 700; }
  .zone-sub { font-size: 11px; color: #94a3b8; margin-top: 2px; }

  .ladder-card {
    background: #0f1117;
    border: 1px solid #1e2433;
    border-radius: 16px;
    padding: 18px 16px;
    margin-bottom: 12px;
  }
  .ladder-title {
    font-size: 10px;
    color: #475569;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .ladder-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .ladder-row:last-child { margin-bottom: 0; }
  .ladder-label {
    width: 72px;
    flex-shrink: 0;
    text-align: right;
  }
  .ladder-label .ratio { font-size: 10px; font-weight: 700; }
  .ladder-label .price { font-size: 11px; color: #94a3b8; }
  .ladder-line {
    flex: 1;
    height: 2px;
    border-radius: 1px;
  }
  .ladder-tag {
    font-size: 9px;
    border-radius: 4px;
    padding: 1px 5px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .cur-tag { font-size: 9px; color: #2563eb; flex-shrink: 0; }

  .level-card {
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .level-left { flex: 1; }
  .level-badge-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .level-badge {
    font-size: 11px;
    font-weight: 700;
    border-radius: 4px;
    padding: 1px 7px;
    letter-spacing: 0.05em;
  }
  .level-name { font-size: 12px; color: #94a3b8; }
  .level-scene { font-size: 11px; color: #64748b; line-height: 1.5; }
  .level-right { text-align: right; flex-shrink: 0; }
  .level-price { font-size: 22px; font-weight: 700; line-height: 1; }
  .level-change { font-size: 10px; color: #475569; margin-top: 3px; }

  .footer-note {
    text-align: center;
    font-size: 10px;
    color: #334155;
    margin-top: 8px;
    letter-spacing: 0.08em;
  }

  .fade-in { animation: fadeUp 0.4s ease forwards; opacity: 0; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .d1 { animation-delay: 0.05s; }
  .d2 { animation-delay: 0.12s; }
  .d3 { animation-delay: 0.19s; }
  .d4 { animation-delay: 0.26s; }
  .d5 { animation-delay: 0.33s; }
</style>
</head>
<body>

<div class="header" id="header">
  <div class="header-sub">Fibonacci · Support &amp; Resistance</div>
  <h1 id="formula" class="buy-mode">B − (B−A) × 比率</h1>
  <p id="subtitle">斐波那契回撤 · 核心支撑位</p>
</div>

<div class="container">

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn buy-active" id="btn-buy" onclick="setMode('buy')">📈 抄底模式</button>
    <button class="mode-btn inactive"   id="btn-sell" onclick="setMode('sell')">📉 逃顶模式</button>
  </div>

  <!-- Input Card -->
  <div class="card">
    <div class="input-grid">
      <div class="input-group">
        <label id="label-a">A点 — 波段低点</label>
        <input type="number" id="a" placeholder="e.g. 120.00" inputmode="decimal" class="buy-focus">
      </div>
      <div class="input-group">
        <label id="label-b">B点 — 波段高点</label>
        <input type="number" id="b" placeholder="e.g. 180.00" inputmode="decimal" class="buy-focus">
      </div>
    </div>
    <div class="input-full">
      <label>当前价格（可选）— 自动定位区间</label>
      <input type="number" id="cur" placeholder="e.g. 155.00" inputmode="decimal">
    </div>
    <button class="calc-btn buy" id="calc-btn" onclick="calculate()">计算支撑位 →</button>
  </div>

  <div id="results"></div>
</div>

<script>
let mode = 'buy';

const BUY_RATIOS = [
  { ratio: 0.5,   label: "0.5",   name: "多空分水岭", color: "#f59e0b", bg: "rgba(245,158,11,0.08)",  border: "rgba(245,158,11,0.25)",  scene: "上涨回调浅撤，强势股首选入场位" },
  { ratio: 0.618, label: "0.618", name: "黄金支撑位", color: "#10b981", bg: "rgba(16,185,129,0.08)",  border: "rgba(16,185,129,0.25)",  scene: "200亿+大盘股核心抄底位，共识最强" },
  { ratio: 0.786, label: "0.786", name: "极限支撑位", color: "#ef4444", bg: "rgba(239,68,68,0.08)",   border: "rgba(239,68,68,0.25)",   scene: "震荡整理深回调，最后防线，破则止损" },
];

const SELL_RATIOS = [
  { ratio: 0.5,   label: "0.5",   name: "空头反手位", color: "#a78bfa", bg: "rgba(167,139,250,0.08)", border: "rgba(167,139,250,0.25)", scene: "反弹到一半，弱势股常见出货位" },
  { ratio: 0.618, label: "0.618", name: "黄金阻力位", color: "#f97316", bg: "rgba(249,115,22,0.08)",  border: "rgba(249,115,22,0.25)",  scene: "反弹最常见终点，大盘股主力减仓区" },
  { ratio: 0.786, label: "0.786", name: "极限反弹位", color: "#ef4444", bg: "rgba(239,68,68,0.08)",   border: "rgba(239,68,68,0.25)",   scene: "到这里仍未突破B点，趋势未反转，坚决离场" },
];

function setMode(m) {
  mode = m;
  document.getElementById('results').style.display = 'none';
  document.getElementById('results').innerHTML = '';

  if (m === 'buy') {
    document.getElementById('btn-buy').className  = 'mode-btn buy-active';
    document.getElementById('btn-sell').className = 'mode-btn inactive';
    document.getElementById('formula').className  = 'buy-mode';
    document.getElementById('formula').textContent = 'B − (B−A) × 比率';
    document.getElementById('subtitle').textContent = '斐波那契回撤 · 核心支撑位';
    document.getElementById('label-a').textContent = 'A点 — 波段低点';
    document.getElementById('label-b').textContent = 'B点 — 波段高点';
    document.getElementById('calc-btn').className  = 'calc-btn buy';
    document.getElementById('calc-btn').textContent = '计算支撑位 →';
    document.querySelectorAll('.buy-focus').forEach(el => el.className = 'buy-focus');
  } else {
    document.getElementById('btn-buy').className  = 'mode-btn inactive';
    document.getElementById('btn-sell').className = 'mode-btn sell-active';
    document.getElementById('formula').className  = 'sell-mode';
    document.getElementById('formula').textContent = 'A + (B−A) × 比率';
    document.getElementById('subtitle').textContent = '斐波那契反弹 · 核心阻力位';
    document.getElementById('label-a').textContent = 'A点 — 反弹起点（阶段低）';
    document.getElementById('label-b').textContent = 'B点 — 前期高点';
    document.getElementById('calc-btn').className  = 'calc-btn sell';
    document.getElementById('calc-btn').textContent = '计算阻力位 →';
  }
}

function getBuyZone(cur, levels) {
  if (isNaN(cur)) return null;
  if (cur >= levels[0]) return { text: "高于0.5分水岭", sub: "仍在强势区，暂不抄底", color: "#f59e0b", icon: "▲" };
  if (cur >= levels[1]) return { text: "0.5 ~ 0.618 区间", sub: "回调中段，可小仓试探", color: "#fbbf24", icon: "◆" };
  if (cur >= levels[2]) return { text: "0.618 ~ 0.786 区间", sub: "黄金支撑附近，大盘股主力建仓区", color: "#10b981", icon: "★" };
  return { text: "低于极限支撑位", sub: "已跌破0.786，谨慎，趋势可能逆转", color: "#ef4444", icon: "▼" };
}

function getSellZone(cur, levels) {
  if (isNaN(cur)) return null;
  if (cur <= levels[0]) return { text: "低于0.5阻力位", sub: "反弹力度弱，继续观望或持仓等待", color: "#a78bfa", icon: "▼" };
  if (cur <= levels[1]) return { text: "0.5 ~ 0.618 区间", sub: "接近黄金阻力，可分批减仓", color: "#f97316", icon: "◆" };
  if (cur <= levels[2]) return { text: "0.618 ~ 0.786 区间", sub: "强反弹区，未突破前坚决清仓", color: "#ef4444", icon: "★" };
  return { text: "超过极限反弹位", sub: "趋势可能已反转，重新评估", color: "#10b981", icon: "▲" };
}

function calculate() {
  const av = parseFloat(document.getElementById('a').value);
  const bv = parseFloat(document.getElementById('b').value);
  const cv = parseFloat(document.getElementById('cur').value);
  const hasCur = !isNaN(cv) && document.getElementById('cur').value !== '';

  if (isNaN(av) || isNaN(bv) || bv <= av) {
    alert('请确认：B点 > A点，且两个值都已填写');
    return;
  }

  const RATIOS = mode === 'buy' ? BUY_RATIOS : SELL_RATIOS;
  const levels = mode === 'buy'
    ? RATIOS.map(r => bv - (bv - av) * r.ratio)
    : RATIOS.map(r => av + (bv - av) * r.ratio);

  const range = (bv - av).toFixed(2);
  const zone = hasCur
    ? (mode === 'buy' ? getBuyZone(cv, levels) : getSellZone(cv, levels))
    : null;

  let html = '';

  // Zone banner
  if (zone) {
    html += `
    <div class="zone-banner fade-in" style="background:${zone.color}15;border:1px solid ${zone.color}40;">
      <div class="zone-icon" style="color:${zone.color}">${zone.icon}</div>
      <div>
        <div class="zone-title" style="color:${zone.color}">${zone.text}</div>
        <div class="zone-sub">${zone.sub}</div>
      </div>
    </div>`;
  }

  // Ladder
  const isBuy = mode === 'buy';
  const topPrice = isBuy ? bv : levels[2];
  const botPrice = isBuy ? levels[2] : av;
  const structureLabel = isBuy
    ? `波段 $${av.toFixed(2)} → $${bv.toFixed(2)} &nbsp;涨幅 +$${range}`
    : `反弹区间 $${av.toFixed(2)} → $${bv.toFixed(2)} &nbsp;空间 $${range}`;

  html += `
  <div class="ladder-card fade-in d1">
    <div class="ladder-title">${structureLabel}</div>
    <div>`;

  // Top anchor
  const topLabel = isBuy ? `B $${bv.toFixed(2)}` : `B(前高) $${bv.toFixed(2)}`;
  html += `
      <div class="ladder-row">
        <div class="ladder-label" style="font-size:10px;color:#64748b">${topLabel}</div>
        <div class="ladder-line" style="background:#334155;height:2px"></div>
      </div>`;

  // Level rows — buy shows high→low, sell shows low→high (reversed)
  const displayRatios = isBuy ? RATIOS : [...RATIOS].reverse();
  const displayLevels = isBuy ? levels : [...levels].reverse();

  displayRatios.forEach((r, i) => {
    const price = displayLevels[i];
    const isNow = hasCur && Math.abs(cv - price) / price < 0.015;
    html += `
      <div class="ladder-row">
        <div class="ladder-label">
          <div class="ratio" style="color:${r.color}">${r.label}</div>
          <div class="price">$${price.toFixed(2)}</div>
        </div>
        <div class="ladder-line" style="background:linear-gradient(90deg,${r.color}70,${r.color}15);${isNow ? `box-shadow:0 0 8px ${r.color}` : ''}"></div>
        ${isNow ? `<div class="ladder-tag" style="color:${r.color};background:${r.color}20;border:1px solid ${r.color}40">NOW</div>` : ''}
      </div>`;
  });

  // Bottom anchor
  const botLabel = isBuy ? `A $${av.toFixed(2)}` : `A(反弹起点) $${av.toFixed(2)}`;
  html += `
      <div class="ladder-row">
        <div class="ladder-label" style="font-size:10px;color:#64748b">${botLabel}</div>
        <div class="ladder-line" style="background:#1e2433;height:1px"></div>
      </div>`;

  // Current price dashed line
  if (hasCur) {
    html += `
      <div class="ladder-row">
        <div class="ladder-label">
          <div class="ratio" style="font-size:9px;color:#2563eb">现价</div>
          <div class="price" style="color:#60a5fa">$${cv.toFixed(2)}</div>
        </div>
        <div class="ladder-line" style="height:1px;background:repeating-linear-gradient(90deg,#2563eb 0,#2563eb 4px,transparent 4px,transparent 8px)"></div>
        <div class="cur-tag">◄ 当前</div>
      </div>`;
  }

  html += `</div></div>`;

  // Level cards
  RATIOS.forEach((r, i) => {
    const price = levels[i];
    const pct = ((price - av) / av * 100);
    const changeLabel = isBuy
      ? `距高点 −${((bv - price) / bv * 100).toFixed(1)}%`
      : `较起点 +${pct.toFixed(1)}%`;
    const delays = ['d2','d3','d4'];
    html += `
    <div class="level-card fade-in ${delays[i]}" style="background:${r.bg};border:1px solid ${r.border}">
      <div class="level-left">
        <div class="level-badge-row">
          <span class="level-badge" style="color:${r.color};background:${r.color}20;border:1px solid ${r.color}40">${r.label}</span>
          <span class="level-name">${r.name}</span>
        </div>
        <div class="level-scene">${r.scene}</div>
      </div>
      <div class="level-right">
        <div class="level-price" style="color:${r.color}">$${price.toFixed(2)}</div>
        <div class="level-change">${changeLabel}</div>
      </div>
    </div>`;
  });

  html += `<div class="footer-note">个人工具 · 不构成投资建议 · 小盘股慎用</div>`;

  const el = document.getElementById('results');
  el.style.display = 'block';
  el.innerHTML = html;
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
</script>
</body>
</html>
